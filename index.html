<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Hello World</title>
  <link rel="stylesheet" href="base-black-theme.css">
  <!-- your other CSS after this -->
  
</head>
<body>  

<body>  
  <div id="myContent"></div>
  
  <script>
    // This will load "test works" from test.txt and display it
    fetch('test.txt')
      .then(response => response.text())
      .then(text => {
        document.getElementById('myContent').innerHTML = text;
      })
      .catch(error => {
        document.getElementById('myContent').innerHTML = 'Error loading file';
      });
  </script>
</body>
</html>
